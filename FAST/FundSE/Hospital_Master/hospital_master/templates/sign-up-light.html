<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="initial-scale=1, width=device-width" />
    <link rel="stylesheet" href="../static/global.css" />
    <link rel="stylesheet" href="../static/login-light.css" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Syne:wght@500;600;700&display=swap"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=DM Sans:wght@400;500;700&display=swap"
    />
  </head>
  <body>
    <div class="login-light">
      <img class="login-light-child" alt="" src="../static/public/frame-46@2x.png" />

      <img class="login-light-item" alt="" src="../static/public/frame-451@2x.png" />

      <form method="POST" class="welcome-to-shaper-signup-group" action="/register-light/{{Url}}">
        {% csrf_token %}
        <div class="welcome-to-shaper-container1">
          <p class="welcome-to-shaper1">Dear {{person}}!Welcome to Hospital Master signup!</p>
        </div>
        <div class="forms-parent1">
          <div class="usernameemail2" >Username/Email</div>
          <input class="forms4" type="email" placeholder="name@domain" id="emailInput" name="email"/>

        </div>
        <div class="forms-parent2">
          <div class="usernameemail2">Password</div>
          <input class="forms5" type="password" placeholder="From" id="passwordInput" name="password"/>

        </div>
        <div class="buttons-parent3">
          <button type="submit" class="buttons10" id="buttons" onclick="saveCredentials()">
            <img
              class="login-24-outline2"
              alt=""
              src="../static/public/login--24--outline1.svg"
            />

            Sign In
          </button>
          <div class="forget-password2">Forget Password?</div>
        </div>
        <div class="or1">OR</div>
        <div class="frame-container">
          <div class="buttons-parent4">
            <button class="buttons11">
              <img
                class="google-24-outline2"
                alt=""
                src="../static/public/google--24--outline.svg"
              />

              <div class="forget-password2">Sign in with Google</div>
            </button>
            <button class="buttons12">
              <img
                class="google-24-outline2"
                alt=""
                src="../static/public/github--24--outline.svg"
              />

              <div class="forget-password2">Sign in with GitHub</div>
            </button>
          </div>
          <div class="buttons-parent5">
            <button class="buttons13">
              <img
                class="google-24-outline2"
                alt=""
                src="../static/public/facebook--24--outline.svg"
              />

              <div class="forget-password2">Sign in with Facebook</div>
            </button>
            <button class="buttons13">
              <img
                class="google-24-outline2"
                alt=""
                src="../static/public/apple--24--outline1.svg"
              />

              <div class="forget-password2">Sign in with Apple</div>
            </button>
          </div>
        </div>
        <div class="already-have-an1" id="alreadyHaveAn">
          Already have an Account? Login!
        </div>
      </form>
      <div class="dark-mode-container" id="frameContainer4">
        <div class="dark-mode2">Dark Mode</div>
        <button class="rectangle-frame" id="frameButton">
          <div class="instance-inner"></div>
        </button>
      </div>
    </div>

  <script>
      
      function saveCredentials() {
        
        // no credentials
      }
      
      
      var buttons = document.getElementById("buttons");
      buttons.addEventListener("click", function () {
      });
      
      var alreadyHaveAn = document.getElementById("alreadyHaveAn");
      if (alreadyHaveAn) {
        alreadyHaveAn.addEventListener("click", function (e) {
          window.location.href = "../login-light/{{Url}}";
        });
      }
      
      var frameButton = document.getElementById("frameButton");
      if (frameButton) {
        frameButton.addEventListener("click", function (e) {
          window.location.href = "../login-dark/{{Url}}";
        });
      }
      
      var frameContainer4 = document.getElementById("frameContainer4");
      if (frameContainer4) {
        frameContainer4.addEventListener("click", function (e) {
          window.location.href = "../signup-dark/{{Url}}";
        });
      }
      </script>
  
      <script>
        {%for msg in messages%}
          alert('{{msg}}')
        {% endfor %}
      </SCRIPT>   
  </body>
</html>
