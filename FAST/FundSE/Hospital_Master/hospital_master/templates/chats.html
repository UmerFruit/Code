<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            font-family: Arial, sans-serif;
        }

        h1 {
            color: #333;
        }

        #chat-messages {
            margin-top: 20px;
            margin-right: 400px;
        }

        p {
            margin: 0;
            padding: 5px;
            word-wrap: break-word; /* Allow long words to be broken and wrap onto the next line */
            overflow-wrap: break-word; /* Ensure words break at the end of the line */
        }

        .your-message {
            color: #333;
            background-color: #e6e6e6;
            border-radius: 10px;
            margin-bottom: 10px;
            position: relative;
            max-width: 70%; /* Set a maximum width for the message box */
        }

        .client-message {
            color: black;
            background-color: #CCFFCC;
            border-radius: 10px;
            margin-bottom: 10px;
            position: relative;
            max-width: 70%; /* Set a maximum width for the message box */
        }

        .timestamp {
            font-size: 0.8em;
            color: #999;
            position: absolute;
            bottom: 0;
            right: 10px;
            opacity: 0.7;
        }
    </style>
    <title>Chat</title>
</head>
<body>
    <h1>{{client.Email}}</h1>

    <div id="chat-messages">
        {% for message in messages %}
            {% if message.sender == person %}
                <p class="your-message">{{ message.content }}<span class="timestamp">{{ message.timestamp }}</span></p>
            {% else %}
                <p class="client-message">{{ client.Email }}: {{ message.content }}<span class="timestamp">{{ message.timestamp }}</span></p>
            {% endif %}
        {% endfor %}
    </div> 

    <form method="post" action="">
        {% csrf_token %}
        {{ form.media }}
        {{ form.as_p }}
        <input type="submit" value="Submit">
    </form>
    <button id="back-button" type="button" style="color: black;">
        <a href="/dashboard-light/{{person}}/?id={{id}}" style="text-decoration: none; color: inherit;">Back</a>
    </button>
</body>
</html>
